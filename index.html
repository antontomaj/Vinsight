<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VINsight</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f5;
      color: #222;
      margin: 0;
      padding: 40px 20px;
      line-height: 1.5;
    }
    .wrap {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 2rem;
    }
    input, button {
      font-size: 1rem;
      padding: 12px;
      width: 100%;
      margin-top: 10px;
      box-sizing: border-box;
    }
    button {
      background: #0b6b6f;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .result {
      margin-top: 24px;
      padding: 16px;
      background: #f2f4f3;
      border-radius: 12px;
      white-space: normal;
    }
    .label {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>VINsight</h1>
    <p>Know what to inspect before you buy.</p>

    <label for="vin">Enter VIN</label>
    <input id="vin" type="text" placeholder="Enter 17-character VIN" maxlength="17" />

    <button id="analyzeBtn" onclick="analyzeVin()">Analyze VIN</button>

    <div class="result" id="result">
      Your vehicle report will show up here.
    </div>
  </div>

  <script>
    async function analyzeVin() {
      const vinInput = document.getElementById('vin');
      const button = document.getElementById('analyzeBtn');
      const result = document.getElementById('result');
      const vin = vinInput.value.trim().toUpperCase();

      if (vin.length !== 17) {
        result.innerHTML = "Please enter a valid 17-character VIN.";
        return;
      }

      button.disabled = true;
      button.textContent = "Looking up VIN...";
      result.innerHTML = "Checking VIN...";

      try {
        const url = `https://vpic.nhtsa.dot.gov/api/vehicles/decodevinvalues/${vin}?format=json`;
        const response = await fetch(url);
        const data = await response.json();
        const vehicle = data.Results && data.Results[0];

        if (!vehicle) {
          result.innerHTML = "No data returned for this VIN.";
          return;
        }

        result.innerHTML = `
          <div><span class="label">VIN:</span> ${vin}</div>
          <div><span class="label">Year:</span> ${vehicle.ModelYear || "Not found"}</div>
          <div><span class="label">Make:</span> ${vehicle.Make || "Not found"}</div>
          <div><span class="label">Model:</span> ${vehicle.Model || "Not found"}</div>
          <div><span class="label">Trim:</span> ${vehicle.Trim || "Not found"}</div>
          <div><span class="label">Body Class:</span> ${vehicle.BodyClass || "Not found"}</div>
          <div><span class="label">Engine Cylinders:</span> ${vehicle.EngineCylinders || "Not found"}</div>
          <div><span class="label">Displacement (L):</span> ${vehicle.DisplacementL || "Not found"}</div>
          <div><span class="label">Fuel Type:</span> ${vehicle.FuelTypePrimary || "Not found"}</div>
          <br>
          <div><span class="label">Next step:</span> Add recalls and known issue analysis.</div>
        `;
      } catch (error) {
        result.innerHTML = "Something went wrong while looking up that VIN.";
      } finally {
        button.disabled = false;
        button.textContent = "Analyze VIN";
      }
    }
  </script>
</body>
</html>
