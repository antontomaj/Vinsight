      background: #f7f7f5;

      padding: 40px 20px;

    }
    .wrap {
      max-width: 760px;

      background: white;
      padding: 24px;
      border-radius: 16px;

    }

      margin-top: 0;
      font-size: 2rem;
    }
    h2 {
      margin-top: 28px;
      font-size: 1.2rem;
    }
    input, button {
      font-size: 1rem;
      padding: 12px;
      width: 100%;
      margin-top: 10px;
      box-sizing: border-box;
    }
    button {
      background: #0b6b6f;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .result, .recalls, .issues {
      margin-top: 24px;
      padding: 16px;
      background: #f2f4f3;
      border-radius: 12px;
    }
    .label {
      font-weight: bold;
    }
    .warning {
      color: #964219;
      font-weight: bold;
    }
    .ok {
      color: #2f6d2f;
      font-weight: bold;
    }
    .recall-card, .issue-card {
      background: white;
      border-radius: 12px;
      padding: 14px;
      margin-top: 14px;
      border: 1px solid #dddddd;
    }
    .recall-title, .issue-title {
      font-weight: bold;
      margin-bottom: 8px;
    }
    .buyer-note {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      background: #fff7e8;
      color: #7a4b00;
      font-weight: bold;
    }
    .issue-severity {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: bold;
      background: #efe7d6;
      color: #7a4b00;
    }
  </style>
</head>

    function getKnownIssues(vehicle) {
      const make = (vehicle.Make || "").toUpperCase();
      const model = (vehicle.Model || "").toUpperCase();
      const year = parseInt(vehicle.ModelYear || "0", 10);

      const matches = knownIssuesLibrary.filter(item => {
        const makeMatch = item.make === make;
        const modelMatch = item.modelIncludes.some(m => model.includes(m));
        const yearMatch = year >= item.yearMin && year <= item.yearMax;
        return makeMatch && modelMatch && yearMatch;
      });

      if (matches.length > 0) {
        return matches;
      }

      return [
        {
          issue: "No specific library match found",
          severity: "General used-car inspection",
          inspect: "Check maintenance records, fluid leaks, cold start behavior, transmission shift quality, suspension noise, tire wear, and warning lights.",
          note: "Even when no specific rule matches, always verify service history and get a pre-purchase inspection."
        }
      ];
    }
