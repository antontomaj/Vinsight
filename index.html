<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VINsight</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f5;
      color: #222;
      margin: 0;
      padding: 40px 20px;
      line-height: 1.5;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 2rem;
    }
    h2 {
      margin-top: 28px;
      font-size: 1.2rem;
    }
    input, button {
      font-size: 1rem;
      padding: 12px;
      width: 100%;
      margin-top: 10px;
      box-sizing: border-box;
    }
    button {
      background: #0b6b6f;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .result, .recalls, .issues {
      margin-top: 24px;
      padding: 16px;
      background: #f2f4f3;
      border-radius: 12px;
    }
    .label {
      font-weight: bold;
    }
    .warning {
      color: #964219;
      font-weight: bold;
    }
    .ok {
      color: #2f6d2f;
      font-weight: bold;
    }
    .recall-card, .issue-card {
      background: white;
      border-radius: 12px;
      padding: 14px;
      margin-top: 14px;
      border: 1px solid #dddddd;
    }
    .recall-title, .issue-title {
      font-weight: bold;
      margin-bottom: 8px;
    }
    .buyer-note {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      background: #fff7e8;
      color: #7a4b00;
      font-weight: bold;
    }
    .issue-severity {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: bold;
      background: #efe7d6;
      color: #7a4b00;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>VINsight</h1>
    <p>Know what to inspect before you buy.</p>

    <label for="vin">Enter VIN</label>
    <input id="vin" type="text" placeholder="Enter 17-character VIN" maxlength="17" />

    <button id="analyzeBtn" onclick="analyzeVin()">Analyze VIN</button>

    <div class="result" id="result">
      Your vehicle report will show up here.
    </div>

    <div class="recalls" id="recallsBox" style="display:none;">
      <h2>Recall check</h2>
      <div id="recallsContent"></div>
    </div>

    <div class="issues" id="issuesBox" style="display:none;">
      <h2>Known issues to inspect</h2>
      <div id="issuesContent"></div>
    </div>
  </div>

  <script>
    function shorten(text, max = 180) {
      if (!text) return "Not listed";
      return text.length > max ? text.slice(0, max).trim() + "..." : text;
    }

    const knownIssuesLibrary = [
      {
        make: "NISSAN",
        modelIncludes: ["ALTIMA", "SENTRA", "ROGUE", "PATHFINDER", "VERSA", "MAXIMA"],
        yearMin: 2013,
        yearMax: 2020,
        issue: "CVT transmission reputation",
        severity: "High priority check",
        inspect: "Ask about transmission replacement, slipping, delayed acceleration, shuddering, and fluid service history.",
        note: "Many shoppers specifically watch these vehicles for CVT-related complaints."
      },
      {
        make: "SUBARU",
        modelIncludes: ["OUTBACK", "FORESTER", "IMPREZA", "LEGACY"],
        yearMin: 2000,
        yearMax: 2012,
        issue: "Head gasket concern on older Subaru engines",
        severity: "High priority check",
        inspect: "Look for overheating history, coolant loss, oil leaks, sweet smell from engine bay, or head gasket replacement records.",
        note: "Older Subaru models are often discussed for head gasket issues, especially before later engine updates."
      },
      {
        make: "BMW",
        modelIncludes: ["328I", "528I", "X3", "X5"],
        yearMin: 2007,
        yearMax: 2015,
        issue: "Timing chain / guide wear on certain engines",
        severity: "Important check",
        inspect: "Listen for rattling at startup, ask about timing chain service, and review oil-change history carefully.",
        note: "Timing chain issues can become expensive if ignored."
      },
      {
        make: "AUDI",
        modelIncludes: ["A4", "A5", "Q5"],
        yearMin: 2009,
        yearMax: 2017,
        issue: "Timing chain tensioner and oil consumption concerns",
        severity: "Important check",
        inspect: "Ask about oil usage between changes, startup noise, tensioner updates, and maintenance records.",
        note: "Some buyers specifically screen these models for timing and oil-consumption issues."
      },
      {
        make: "VOLKSWAGEN",
        modelIncludes: ["PASSAT", "JETTA", "TIGUAN", "CC"],
        yearMin: 2008,
        yearMax: 2016,
        issue: "Timing chain tensioner / turbo-related concerns on some engines",
        severity: "Important check",
        inspect: "Check for rough cold starts, timing service records, turbo performance issues, and oil consumption.",
        note: "Maintenance history matters a lot on these vehicles."
      },
      {
        make: "FORD",
        modelIncludes: ["FOCUS", "FIESTA"],
        yearMin: 2012,
        yearMax: 2018,
        issue: "Dual-clutch transmission complaints",
        severity: "High priority check",
        inspect: "Ask about hesitation, jerking, clutch replacements, transmission software updates, and stop-and-go drivability.",
        note: "These models are commonly discussed for transmission behavior problems."
      },
      {
        make: "HONDA",
        modelIncludes: ["ACCORD", "CIVIC", "CR-V"],
        yearMin: 2016,
        yearMax: 2021,
        issue: "Turbo engine oil dilution check on some models",
        severity: "Watch item",
        inspect: "Ask about fuel smell in oil, frequent oil changes, software updates, and cold-weather driving patterns.",
        note: "Not every vehicle is affected, but it is worth checking service history."
      }
    ];

    function getKnownIssues(vehicle) {
      const make = (vehicle.Make || "").toUpperCase();
      const model = (vehicle.Model || "").toUpperCase();
      const year = parseInt(vehicle.ModelYear || "0", 10);

      const matches = knownIssuesLibrary.filter(item => {
        const makeMatch = item.make === make;
        const modelMatch = item.modelIncludes.some(m => model.includes(m));
        const yearMatch = year >= item.yearMin && year <= item.yearMax;
        return makeMatch && modelMatch && yearMatch;
      });

      if (matches.length > 0) {
        return matches;
      }

      return [
        {
          issue: "No specific library match found",
          severity: "General used-car inspection",
          inspect: "Check maintenance records, fluid leaks, cold start behavior, transmission shift quality, suspension noise, tire wear, and warning lights.",
          note: "Even when no specific rule matches, always verify service history and get a pre-purchase inspection."
        }
      ];
    }

    async function analyzeVin() {
      const vinInput = document.getElementById('vin');
      const button = document.getElementById('analyzeBtn');
      const result = document.getElementById('result');
      const recallsBox = document.getElementById('recallsBox');
      const recallsContent = document.getElementById('recallsContent');
      const issuesBox = document.getElementById('issuesBox');
      const issuesContent = document.getElementById('issuesContent');
      const vin = vinInput.value.trim().toUpperCase();

      recallsBox.style.display = 'none';
      recallsContent.innerHTML = '';
      issuesBox.style.display = 'none';
      issuesContent.innerHTML = '';

      if (vin.length !== 17) {
        result.innerHTML = "Please enter a valid 17-character VIN.";
        return;
      }

      button.disabled = true;
      button.textContent = "Looking up VIN...";
      result.innerHTML = "Checking VIN...";

      try {
        const decodeUrl = `https://vpic.nhtsa.dot.gov/api/vehicles/decodevinvalues/${vin}?format=json`;
        const decodeResponse = await fetch(decodeUrl);
        const decodeData = await decodeResponse.json();
        const vehicle = decodeData.Results && decodeData.Results[0];

        if (!vehicle) {
          result.innerHTML = "No data returned for this VIN.";
          return;
        }

        const year = vehicle.ModelYear || "";
        const make = vehicle.Make || "";
        const model = vehicle.Model || "";

        result.innerHTML = `
          <div><span class="label">VIN:</span> ${vin}</div>
          <div><span class="label">Year:</span> ${year || "Not found"}</div>
          <div><span class="label">Make:</span> ${make || "Not found"}</div>
          <div><span class="label">Model:</span> ${model || "Not found"}</div>
          <div><span class="label">Trim:</span> ${vehicle.Trim || "Not found"}</div>
          <div><span class="label">Body Class:</span> ${vehicle.BodyClass || "Not found"}</div>
          <div><span class="label">Engine Cylinders:</span> ${vehicle.EngineCylinders || "Not found"}</div>
          <div><span class="label">Displacement (L):</span> ${vehicle.DisplacementL || "Not found"}</div>
          <div><span class="label">Fuel Type:</span> ${vehicle.FuelTypePrimary || "Not found"}</div>
        `;

        if (year && make && model) {
          button.textContent = "Checking recalls...";
          const recallUrl = `https://api.nhtsa.gov/recalls/recallsByVehicle?make=${encodeURIComponent(make)}&model=${encodeURIComponent(model)}&modelYear=${encodeURIComponent(year)}`;
          const recallResponse = await fetch(recallUrl);
          const recallData = await recallResponse.json();
          const recalls = recallData.results || [];

          recallsBox.style.display = 'block';

          if (recalls.length === 0) {
            recallsContent.innerHTML = `
              <div class="ok">No recall records were returned for this year, make, and model.</div>
              <p>This is a general check, not a guarantee for the exact VIN.</p>
            `;
          } else {
            recallsContent.innerHTML = `
              <div class="warning">${recalls.length} recall record(s) found.</div>
              <p>Showing the first 3 recalls only. Verify recall completion with the seller or dealer.</p>
              ${recalls.slice(0, 3).map(r => `
                <div class="recall-card">
                  <div class="recall-title">${r.NHTSACampaignNumber || "No campaign number"} • ${r.Component || "Component not listed"}</div>
                  <div><span class="label">Problem:</span> ${shorten(r.Summary, 160)}</div>
                  <div><span class="label">Risk:</span> ${shorten(r.Consequence || r.Conequence, 140)}</div>
                  <div><span class="label">Fix:</span> ${shorten(r.Remedy, 140)}</div>
                </div>
              `).join('')}
              <div class="buyer-note">Ask the seller for proof that recall repairs were completed.</div>
            `;
          }

          const issues = getKnownIssues(vehicle);
          issuesBox.style.display = 'block';
          issuesContent.innerHTML = `
            ${issues.map(item => `
              <div class="issue-card">
                <div class="issue-title">${item.issue}</div>
                <div><span class="label">What to inspect:</span> ${item.inspect}</div>
                <div style="margin-top:8px;"><span class="label">Why it matters:</span> ${item.note}</div>
                <div class="issue-severity">${item.severity}</div>
              </div>
            `).join('')}
            <div class="buyer-note">If the vehicle matches one of these patterns, ask for service records and consider a pre-purchase inspection before buying.</div>
          `;
        }
      } catch (error) {
        result.innerHTML = "Something went wrong while looking up that VIN.";
      } finally {
        button.disabled = false;
        button.textContent = "Analyze VIN";
      }
    }
  </script>
</body>
</html>
